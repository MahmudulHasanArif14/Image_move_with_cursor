<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Move with Cursor</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>


    <div class="elements">
        <div class="elem" data-smooth="0.16">
            <h1>Supra Car</h1>
            <img src="https://images.unsplash.com/photo-1583121274602-3e2820c69888?q=80&w=1740&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                alt="Supra Car">
        </div>


        <div class="elem" data-smooth="0.16">
            <h1>Another Element</h1>
            <img src="https://images.unsplash.com/photo-1542362567-b07e54358753?q=80&w=1740&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                alt="A sleek sports car parked outdoors, showcasing its aerodynamic design and polished exterior in daylight conditions"
                srcset="">
        </div>
        <div class="elem" data-smooth="0.16">
            <h1>Third Element</h1>
            <img src="https://images.unsplash.com/photo-1525609004556-c46c7d6cf023?q=80&w=904&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
        </div>

        <div class="elem" data-smooth="0.16">
            <h1>Fourth Element</h1>

            <img src="https://images.unsplash.com/photo-1602777924012-f8664ffeed27?q=80&w=928&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="" srcset="">
        </div>


    </div>



    <script src="script.js"></script>
</body>

</html>
